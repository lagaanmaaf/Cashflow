<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cashflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: #F7F5F0; }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
button { font-family: 'Plus Jakarta Sans', sans-serif; }
textarea { font-family: 'Plus Jakarta Sans', sans-serif; }
input { font-family: 'Plus Jakarta Sans', sans-serif; }

@keyframes pulse-ring {
0% { transform: scale(1); opacity: .6; }
70% { transform: scale(1.5); opacity: 0; }
100% { transform: scale(1); opacity: 0; }
}
@keyframes alertIn {
0% { opacity: 0; transform: translateY(-8px) scale(0.97); }
100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

#root { min-height: 100vh; background: #F7F5F0; overflow-x: hidden; }
.app-wrap { width: 100%; max-width: 480px; margin: 0 auto; position: relative; }

@media (min-width: 600px) {
#root { display: flex; justify-content: center; background: #EDEBE6; }
.app-wrap { box-shadow: 0 0 60px rgba(0,0,0,0.10); background: #F7F5F0; min-height: 100vh; }
}

.topbar {
padding: env(safe-area-inset-top, 28px) 18px 10px;
padding-top: max(env(safe-area-inset-top, 28px), 28px);
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; background: #F7F5F0; z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 8px; }
.logo-circle {
width: 32px; height: 32px; background: #1A4D3A; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-family: 'Sora', sans-serif; font-size: 15px; color: #AEDED0; font-weight: 700;
}
.app-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; color: #1A2E25; letter-spacing: -0.3px; }
.topbar-right { display: flex; gap: 8px; }
.icon-btn {
width: 34px; height: 34px; border-radius: 50%; background: #EAE8E0;
border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: #DDD9D0; }

.summary-card {
margin: 0 16px; background: #1A4D3A; border-radius: 22px; padding: 0 22px; text-align: center;
height: 105px; display: flex; flex-direction: column; justify-content: center; position: relative;
}
.summary-label { font-size: 18px; color: #fff; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.summary-amount { font-family: 'Sora', sans-serif; font-size: 34px; font-weight: 700; color: #fff; margin: 4px 0 0; letter-spacing: -1px; }
.summary-eye-btn {
position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
background: none; border: none; color: #fff; cursor: pointer; padding: 8px;
display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: opacity 0.2s;
}
.summary-eye-btn:hover { opacity: 1; }
.summary-eye-btn svg { width: 22px; height: 22px; }

.alert-row { margin: 1px 16px 0; min-height: 20px; display: flex; align-items: center; justify-content: center; }
.toast-inline { font-size: 13px; font-weight: 600; color: #1A4D3A; animation: alertIn 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.excluded-msg { font-size: 12px; font-weight: 600; color: #DC2626; display: flex; align-items: center; gap: 4px; }

.search-bar {
margin: 6px 16px 0; background: #fff; border-radius: 13px; border: 0.5px solid #E8E6DF;
display: flex; align-items: center; gap: 8px; padding: 10px 13px;
}
.search-bar input { border: none; outline: none; font-size: 13px; color: #3D3D3A; background: transparent; width: 100%; }

.filter-row { display: flex; gap: 6px; padding: 10px 16px 0; flex-wrap: wrap; align-items: center; }

.dropdown-btn {
display: inline-flex; align-items: center; gap: 4px; padding: 6px 8px 6px 10px;
border-radius: 20px; background: #EAE8E0; color: #3D5247; border: 1.5px solid transparent;
font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 11px; cursor: pointer;
white-space: nowrap; position: relative;
}
.dropdown-btn.active { background: #1A4D3A; color: #ffff; border-color: #1A4D3A; }

.dropdown-menu {
position: absolute; top: calc(100% + 6px); left: 0; background: #fff;
border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.13); z-index: 50;
min-width: 160px; overflow: hidden; border: 0.5px solid #E8E6DF; display: none;
}
.dropdown-menu.open { display: block; }
.dropdown-item {
padding: 9px 14px; font-size: 13px; font-weight: 500; color: #3D3D3A; cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.dropdown-item.selected { font-weight: 700; color: #1A4D3A; background: #F0FDF4; }
.dropdown-item:hover { background: #F7F5F0; }
.chk-box {
width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #D3D1C7;
background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chk-box.checked { background: #1A4D3A; border-color: #1A4D3A; }

.cal-btn {
display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;
border-radius: 50%; background: #EAE8E0; color: #3D5247;
border: 1.5px solid transparent; cursor: pointer; flex-shrink: 0;
}
.cal-btn.active { background: #1A4D3A; color: #AEDED0; border-color: #1A4D3A; }

.section-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 8px; }
.section-title { font-size: 13px; font-weight: 700; color: #1A2E25; }
.section-count { font-size: 12px; color: #A0AFA8; }

/* ─── VIRTUAL SCROLL CONTAINER ─── */
.expenses-list-container {
max-height: 680px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 4px;
position: relative;
}
.expenses-list-container::-webkit-scrollbar { display: none; }
/* Virtual spacer elements */
.virtual-spacer-top { flex-shrink: 0; }
.virtual-spacer-bottom { flex-shrink: 0; }

.expense-row {
background: #fff; border-radius: 16px; padding: 10px 14px; display: flex; align-items: center; gap: 12px;
border: 0.5px solid #E8E6DF; margin: 0 16px 8px; transition: opacity 0.2s;
}
.expense-row.disabled { background: #F7F5F0; border-color: #E0DDD5; opacity: 0.6; }
.cat-icon {
width: 56px; height: 56px; border-radius: 13px; display: flex; align-items: center; justify-content: center;
font-size: 22px; font-weight: 700; flex-shrink: 0;
}
.exp-middle { flex: 1; min-width: 0; height: 56px; display: flex; flex-direction: column; justify-content: space-between; padding: 1px 0; }
.exp-name { font-size: 14px; font-weight: 600; color: #1A2E25; line-height: 1.2; }
.exp-name.strikethrough { text-decoration: line-through; color: #A0AFA8; }
.exp-date { font-size: 10px; color: #8A8880; margin-top: 2px; line-height: 1.2; }
.exp-actions { display: flex; gap: 4px; }
.action-btn {
border: none; border-radius: 5px; width: 20px; height: 20px;
display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.exp-right { text-align: right; flex-shrink: 0; }
.exp-amount { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: #1A4D3A; }
.exp-amount.disabled { color: #A0AFA8; }
.exp-desc {
  font-size: 9px;
  color: #1A4D3A;
  margin-top: 4px;
  font-weight: 700;
  letter-spacing: 0.3px;
  max-width: 110px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
  background: #E6F4EE;
  border-radius: 5px;
  padding: 2px 6px;
  display: inline-block;
}
.exp-excl { font-size: 9px; color: #DC2626; margin-top: 2px; font-weight: 600; letter-spacing: 0.3px; }

.action-row { padding: 10px 16px 6px; display: flex; gap: 9px; justify-content: space-between; }
.add-btn {
background: #1A4D3A; color: #fff; border: none; border-radius: 12px; padding: 9px 16px;
font-size: 13px; font-weight: 700; cursor: pointer;
display: flex; align-items: center; gap: 6px; white-space: nowrap; height: 40px;
}
.speak-btn {
background: #EAE8E0; color: #3D5247; border: none; border-radius: 12px; padding: 9px 16px;
font-size: 13px; font-weight: 700; cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; height: 40px;
transition: all 0.2s; min-width: 135px;
}
.speak-btn.listening { background: #DC2626; color: #fff; box-shadow: 0 4px 12px rgba(220,38,38,0.3); }

.cat-section-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 4px; }
.cat-section-title { font-size: 20px; font-weight: 700; color: #1A2E25; }
.cat-toast-msg { font-size: 13px; font-weight: 600; animation: alertIn 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.cat-filter-row { display: flex; gap: 6px; padding: 6px 16px 10px; flex-wrap: wrap; align-items: center; }
.delete-all-btn {
margin-left: auto; display: flex; align-items: center; gap: 5px; padding: 6px 12px;
border-radius: 20px; font-size: 11px; font-weight: 600; background: #FEF2F2; color: #DC2626;
border: none; cursor: pointer;
}

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 12px; }
.cat-card {
background: #fff; border-radius: 16px; padding: 12px; border: 0.5px solid #E8E6DF;
cursor: pointer; transition: transform 0.15s; position: relative; height: 88px; overflow: hidden;
display: flex; align-items: flex-start; gap: 10px;
}
.cat-card:hover { transform: scale(1.02); }
.cat-remove-btn {
position: absolute; top: 6px; right: 7px; background: none; border: none;
color: #C0BDB5; cursor: pointer; font-size: 16px; line-height: 1; padding: 0; z-index: 1;
}
.cat-logo { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
.cat-info { min-width: 0; flex: 1; padding-top: 1px; padding-right: 14px; }
.cat-name { font-weight: 700; font-size: 13px; color: #1A2E25; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
.cat-amount { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px; color: #1A4D3A; line-height: 1.2; }
.cat-count { font-size: 10px; color: #A0AFA8; margin-top: 3px; }

.add-cat-wrap { padding: 10px 16px 60px; }
.add-cat-btn {
width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
background: #1A4D3A; color: #fff; border: none; border-radius: 12px; padding: 9px 0; height: 40px;
font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.2px;
box-shadow: 0 4px 16px rgba(26,77,58,0.22); transition: opacity 0.15s;
}
.add-cat-btn:hover { opacity: 0.9; }

.bottom-nav {
position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
border-top: 1px solid #E8E6DF; display: flex; z-index: 20;
}
@media (min-width: 600px) {
.bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); }
}
.nav-tab {
flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
padding: 10px 0 8px; background: none; border: none; cursor: pointer; gap: 3px;
}
.nav-label { font-size: 10px; font-weight: 500; color: #8A8880; }
.nav-label.active { font-weight: 700; color: #1A4D3A; }

.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.38);
display: flex; align-items: flex-end; justify-content: center; z-index: 100;
}
.modal-overlay.center { align-items: center; padding: 0 20px; }
.modal-box {
background: #fff; border-radius: 22px 22px 0 0; padding: 22px 20px 36px;
width: 100%; max-width: 390px; max-height: 90vh; overflow-y: auto; scrollbar-width: none;
}
.modal-box::-webkit-scrollbar { display: none; }
.modal-box.center-box { border-radius: 20px; padding: 22px 20px 24px; max-width: 360px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 700; color: #1A2E25; }
.modal-close {
background: #EAE8E0; border: none; border-radius: 50%; width: 30px; height: 30px;
font-size: 16px; color: #5F5E5A; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.form-label { font-size: 11px; font-weight: 600; color: #8A8880; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 5px; display: block; }
.form-input {
width: 100%; padding: 11px 13px; border-radius: 11px; border: 0.5px solid #D3D1C7; font-size: 14px; color: #1A2E25;
background: #F7F5F0; outline: none; box-sizing: border-box;
}
.form-input:focus { border-color: #1A4D3A; }
textarea.form-input { min-height: 72px; resize: vertical; }
.amount-row { display: flex; gap: 8px; margin-bottom: 8px; }
.currency-badge {
background: #EAE8E0; border-radius: 11px; padding: 0 13px;
display: flex; align-items: center; font-weight: 700; font-size: 13px; color: #3D5247; flex-shrink: 0; gap: 3px;
}
.add-extra-btn {
background: none; border: 0.5px dashed #B4B2A9; border-radius: 10px; padding: 8px 14px;
font-size: 12px; color: #5F5E5A; cursor: pointer; font-weight: 600; margin-bottom: 14px;
display: flex; align-items: center; gap: 6px;
}
.date-time-grid { display: grid; grid-template-columns: 0.85fr 1fr; gap: 10px; margin-bottom: 14px; }
.input-with-icon { position: relative; }
.input-with-icon input { padding-right: 36px; }
.input-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #8A8880; pointer-events: none; }
.modal-btn-row { display: flex; gap: 10px; }
.btn-cancel {
flex: 1; background: #EAE8E0; color: #3D5247; border: none; border-radius: 13px;
padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-save {
flex: 2; background: #1A4D3A; color: #ffff; border: none; border-radius: 13px;
padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-save.disabled { background: #B4B2A9; cursor: default; }
.extra-remove { background: #FEF2F2; border: none; border-radius: 11px; padding: 0 13px; color: #DC2626; cursor: pointer; font-weight: 700; font-size: 18px; }

.toast-fixed {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 12px;
font-size: 13px; font-weight: 500; z-index: 300; white-space: nowrap;
animation: alertIn 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.chart-fullscreen-overlay {
position: fixed; inset: 0; z-index: 1000;
background: #F7F5F0; padding: 40px 20px;
display: flex; flex-direction: column; justify-content: center;
animation: fadeIn 0.2s ease-out forwards;
}

.bar-chart-wrap { display: flex; gap: 8px; align-items: flex-end; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-val { font-family: 'Sora', sans-serif; font-size: 9px; color: #7ABDA8; font-weight: 600; }
.bar-body { width: 100%; background: #1A4D3A; border-radius: 6px 6px 3px 3px; transition: height 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.bar-label { font-size: 9px; color: #A0AFA8; font-family: 'Plus Jakarta Sans', sans-serif; }

.cal-month-nav {
margin: 0 16px 12px; background: #fff; border-radius: 16px; border: 0.5px solid #E8E6DF;
padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
}
.cal-nav-btn {
width: 32px; height: 32px; border-radius: 50%; background: #EAE8E0; border: none;
cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.cal-month-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: #1A2E25; }
.cal-grid-wrap { margin: 0 16px; background: #fff; border-radius: 16px; border: 0.5px solid #E8E6DF; padding: 14px 10px 18px; overflow: hidden; }
.cal-day-headers { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 8px; }
.cal-day-header { text-align: center; font-size: 11px; font-weight: 600; color: #A0AFA8; padding: 4px 0; }
.cal-day-cells { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px 4px; }
.cal-cell {
border-radius: 10px; background: transparent; border: 1.5px solid transparent;
padding: 6px 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 44px;
}
.cal-cell.has-amt { background: #1A4D3A; }
.cal-cell.is-today { background: #EAF5EF; border-color: #1A4D3A; }
.cal-cell.no-amt { opacity: 0.35; pointer-events: none; }
.cal-day-num { font-size: 13px; font-weight: 500; color: #1A2E25; line-height: 1; }
.cal-cell.has-amt .cal-day-num { font-weight: 700; color: #fff; }
.cal-cell.is-today .cal-day-num { font-weight: 700; color: #1A4D3A; }
.cal-day-amt { font-size: 9px; color: #AEDED0; font-weight: 600; margin-top: 3px; line-height: 1; }

.settings-card { margin: 8px 16px 0; background: #fff; border-radius: 18px; border: 0.5px solid #E8E6DF; overflow: hidden; }
.settings-item { padding: 16px 18px 12px; }
.settings-name { font-size: 13px; font-weight: 700; color: #1A2E25; margin-bottom: 4px; }
.settings-desc { font-size: 11px; color: #A0AFA8; margin-bottom: 14px; }
.toggle-row { display: flex; gap: 8px; }
.toggle-btn {
flex: 1; padding: 10px 0; border-radius: 11px; border: none; cursor: pointer;
font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; transition: all 0.15s;
}

.analysis-card { background: #fff; border-radius: 18px; border: 0.5px solid #E8E6DF; padding: 18px; margin: 0 16px 12px; }
.progress-track { width: 100%; height: 16px; background: #EAE8E0; border-radius: 8px; overflow: hidden; margin-top: 8px; position: relative; }
.progress-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease-out; }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 16px 12px; }
.metric-card { background: #fff; border-radius: 18px; border: 0.5px solid #E8E6DF; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
.metric-title { font-size: 11px; color: #8A8880; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-val { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; color: #1A2E25; }
.metric-sub { font-size: 11px; font-weight: 600; margin-top: 2px; }
.trend-down { color: #16A34A; }
.trend-up { color: #DC2626; }
.budget-header { display: flex; justify-content: space-between; align-items: flex-end; }
.edit-budget-btn { background: none; border: none; color: #2563EB; font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px; margin: -4px; border-radius: 4px; }
.edit-budget-btn:hover { background: #EFF6FF; }

.info-card { background: #fff; border-radius: 16px; padding: 18px; border: 0.5px solid #E8E6DF; margin: 0 16px 12px; }
.info-card-title { font-size: 15px; font-weight: 700; color: #1A2E25; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.info-card-text { font-size: 13px; color: #3D3D3A; line-height: 1.5; margin-bottom: 8px; }
.info-bullet { position: relative; padding-left: 12px; margin-bottom: 8px; font-size: 13px; color: #3D3D3A; line-height: 1.6; }
.info-bullet::before { content: "•"; color: #1A4D3A; font-weight: bold; position: absolute; left: 0; top: 0; }
.info-highlight { background: #F0FDF4; color: #1A4D3A; padding: 2px 6px; border-radius: 4px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; white-space: nowrap; display: inline-block; margin: 0 2px; }

.download-dialog { background: #fff; border-radius: 18px; padding: 24px 22px 22px; width: 100%; max-width: 340px; position: relative; }
.download-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; color: #1A2E25; margin-bottom: 14px; }
.download-p { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: #3D3D3A; line-height: 1.6; margin: 0 0 8px; }
.dialog-close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 18px; color: #8A8880; cursor: pointer; line-height: 1; }
.btn-ok { width: 100%; background: #1A4D3A; color: #fff; border: none; border-radius: 13px; padding: 13px 0; font-size: 15px; font-weight: 700; cursor: pointer; }

.month-picker-wrap { background: #fff; border-radius: 22px 22px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; }
.month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

// Virtual scroll config — row height ~88px (10px margin + 78px row)
const ROW_H = 88;

// Memoization cache
let _cache = {
sorted: null, sortedStamp: 0,
filtered: null, filteredKey: '',
catSorted: {}, catFiltered: {},
bulkFiltered: null, bulkFilteredKey: ''
};

// Pending render RAF handle

let _pendingRender = false;

// Debounce timers

function scheduleRender() {
if (_pendingRender) return;
_pendingRender = true;
_rafHandle = requestAnimationFrame(() => {
_pendingRender = false;
render();
});
}

// ─── Data & State ──────────────────────────────────────────────
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let savedData = JSON.parse(localStorage.getItem('cashflow_data') || '{"expenses":[],"categories":[]}');
let state = {

showTotalAmt: savedData.showTotalAmt !== undefined ? savedData.showTotalAmt : true,
monthlyBudget: savedData.monthlyBudget || 50000,
view: "home",

// ─── Invalidate memo cache when data changes ───────────────────
function invalidateCache() {
_cache.sorted = null;
_cache.filtered = null;
_cache.catSorted = {};
_cache.catFiltered = {};
_cache.bulkFiltered = null;
}

function saveToLocal() {
localStorage.setItem('cashflow_data', JSON.stringify({
expenses: state.expenses,
categories: state.categories,
showTotalAmt: state.showTotalAmt,
monthlyBudget: state.monthlyBudget
}));
}

// ─── Memoized sort (only re-sorts when expenses array changes) ─
function getSortedExpenses() {
const stamp = state.expenses.length + (state.expenses[0]?.id||0) + (state.expenses[state.expenses.length-1]?.id||0);
if (_cache.sorted && _cache.sortedStamp === stamp) return _cache.sorted;
const sorted = [...state.expenses].sort((a,b) => {
const dd = new Date(b.date) - new Date(a.date);
return dd !== 0 ? dd : (b.id - a.id);
});
_cache.sorted = sorted;
_cache.sortedStamp = stamp;
return sorted;
}

// ─── Memoized filter ──────────────────────────────────────────
function getFilteredExpenses() {
const key = JSON.stringify({
q: state.searchQuery, m: state.selMonths, y: state.selYears,
dr: state.dateRange, stamp: _cache.sortedStamp
});
if (_cache.filtered && _cache.filteredKey === key) return _cache.filtered;
const sorted = getSortedExpenses();
const filtered = applyFilters(sorted);
_cache.filtered = filtered;
_cache.filteredKey = key;
return filtered;
}

function getBulkFilteredExpenses() {
const key = JSON.stringify({
m: bulkDeleteState.selMonths, y: bulkDeleteState.selYears, stamp: _cache.sortedStamp
});
if (_cache.bulkFiltered && _cache.bulkFilteredKey === key) return _cache.bulkFiltered;
const sorted = getSortedExpenses();
const filtered = sorted.filter(e => {
    const d = new Date(e.date);
    const monthOk = bulkDeleteState.selMonths.length === 0 || bulkDeleteState.selMonths.includes(d.getMonth());
    const yearOk = bulkDeleteState.selYears.length === 0 || bulkDeleteState.selYears.includes(d.getFullYear());
    return monthOk && yearOk;
});
_cache.bulkFiltered = filtered;
_cache.bulkFilteredKey = key;
return filtered;
}

// ─── Category memoization ─────────────────────────────────────
function getCatSorted(cat) {
if (_cache.catSorted[cat]) return _cache.catSorted[cat];
const sorted = getSortedExpenses().filter(e => (e.category||"").toLowerCase() === cat.toLowerCase());
_cache.catSorted[cat] = sorted;
return sorted;
}

function getCatFiltered(cat) {
const key = cat + JSON.stringify(catViewFilters) + _cache.sortedStamp;
if (_cache.catFiltered[key]) return _cache.catFiltered[key];
const all = getCatSorted(cat);
const filtered = all.filter(e => {
const d = new Date(e.date);
const monthOk = catViewFilters.selMonths.length===0 || catViewFilters.selMonths.includes(d.getMonth());
const yearOk = catViewFilters.selYears.length===0 || catViewFilters.selYears.includes(d.getFullYear());
let rangeOk = true;
if (catViewFilters.dateRange?.start) { const s=parseDDMMYYYY(catViewFilters.dateRange.start); if(s) rangeOk=rangeOk&&d>=s; }
if (catViewFilters.dateRange?.end) { const en=parseDDMMYYYY(catViewFilters.dateRange.end); if(en){ en.setHours(23,59,59); rangeOk=rangeOk&&d<=en; } }
return monthOk&&yearOk&&rangeOk;
});
_cache.catFiltered[key] = filtered;
return filtered;
}

const PALETTE = ["#4F46E5", "#059669", "#D97706", "#DC2626", "#2563EB", "#7C3AED", "#DB2777", "#0D9488", "#EA580C", "#0284C7"];

function formatINR(n) {
return "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 2 });
}
function formatCatAmt(n) {
if (n >= 1e9) return "₹" + (n/1e9).toFixed(1).replace(/\.0$/,"") + " Arab";
if (n >= 1e8) return "₹" + (n/1e8).toFixed(1).replace(/\.0$/,"") + " Cr";
return "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 2 });
}
function todayStr() {
const d = new Date();
return `${String(d.getDate()).padStart(2,"0")}-${String(d.getMonth()+1).padStart(2,"0")}-${d.getFullYear()}`;
}

// Updated dateTimeToISO to handle AM/PM properly
function dateTimeToISO(dateStr, timeStr, ampm = "AM") {
    const [dd, mm, yyyy] = dateStr.split("-");
    let [hhStr, minStr] = timeStr.split(":");
    let hh = parseInt(hhStr, 10) || 0;
    const mins = minStr || "00";

    if (hh <= 12) {
        if (ampm === "PM" && hh < 12) hh += 12;
        if (ampm === "AM" && hh === 12) hh = 0;
    }

    const finalHh = String(hh).padStart(2, "0");
    return new Date(`${yyyy}-${mm}-${dd}T${finalHh}:${mins}:00`).toISOString();
}

function parseDDMMYYYY(s) {
if (!s) return null;
const [dd,mm,yyyy] = s.split("-");
const d = new Date(`${yyyy}-${mm}-${dd}`);
return isNaN(d) ? null : d;
}
function robustDateParse(dStr, tStr) {
if (!dStr || !tStr) return new Date().toISOString();
let parts = dStr.split(/[-/]/);
let day, month, year;
if (parts.length === 3) {
if (parts[2].length === 4) { day = parts[0]; month = parts[1]; year = parts[2]; }
else if (parts[0].length === 4) { year = parts[0]; month = parts[1]; day = parts[2]; }
else { day = parts[0]; month = parts[1]; year = "20"+parts[2]; }
let d = new Date(`${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}T${tStr.padStart(5,'0')}:00`);
if (!isNaN(d)) return d.toISOString();
}
let d = new Date(`${dStr} ${tStr}`);
if (!isNaN(d)) return d.toISOString();
return new Date().toISOString();
}
function evalAmount(raw) {
if (!raw) return null;
const cleaned = String(raw).replace(/^=/,"").replace(/[^0-9.+\-*/()]/g,"");
try { const r = eval(cleaned); if (typeof r==="number" && isFinite(r)) return parseFloat(r.toFixed(2)); } catch {}
const plain = parseFloat(cleaned);
return isNaN(plain) ? null : plain;
}
function escHtml(s) {
if (s==null) return '';
return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function guessCategory(name) {
const n = name.toLowerCase();
for (const c of state.categories) { if (n.includes(c.toLowerCase())) return c; }
if (n.includes("zepto")) return "Zepto";
if (n.includes("blinkit") || n.includes("blink")) return "Blinkit";
if (n.includes("swiggy")) return "Swiggy";
if (n.includes("zomato")) return "Zomato";
if (n.includes("pizza") || n.includes("dominos")) return "Pizza";
if (n.includes("coffee")) return "Coffee";
if (n.includes("drink") || n.includes("pepsi") || n.includes("thumbsup") || n.includes("coke") || n.includes("coca")) return "Drinks";
if (n.includes("food") || n.includes("restaurant") || n.includes("cafe") || n.includes("lunch") || n.includes("dinner")) return "Food";
if (n.includes("electricity") || n.includes("electric")) return "Electricity";
if (n.includes("internet") || n.includes("wifi") || n.includes("wi-fi")) return "Internet";
if (n.includes("gas") || n.includes("cyclinder") || n.includes("lpg") || n.includes("cylinder")) return "Gas";
if (n.includes("water")) return "Water";
if (n.includes("mobile") || n.includes("recharge")) return "Mobile Recharge";

if (n.includes("shop") || n.includes("amazon") || n.includes("flipkart") || n.includes("myntra")) return "Shopping";
if (n.includes("grocer")) return "Groceries";
if (n.includes("tea") || n.includes("chaai") || n.includes("chai")) return "Tea";
if (n.includes("gift")) return "Gift";
if (n.includes("trip") || n.includes("travel") || n.includes("flight") || n.includes("train") || n.includes("bus") || n.includes("cab") || n.includes("ola") || n.includes("uber")) return "Travel";
if (n.includes("medicine") || n.includes("doctor") || n.includes("health") || n.includes("pharmacy")) return "Health";
return "Other";
}
function normalizeSpeech(raw) {
let t = raw.toLowerCase().trim();
t = t.replace(/\b(zep\s*to|zapto|zip\s*to|saptu|zeptoo|zipto|zep\b|zap\b|jepto|zepo|zeto|zeppto|xepto|zepta|zepdo|septo|sep\s*to|jepdo|zeitu|zeypto|jero\s*to|zero\s*to|zapdo|jeptu|septu|zaptu|ziptu|zepco|zepko|zapco|saptoo|jeptoo|zeptoh|zeptou|zepto\s*app|jero|zeto\b|zapto\b|jepdo\b|zaptoo|zeptu|ceptu|xepto|xeptu|zaptoo|zedto|zepd|sepdo|sapto|zapt\b|zept\b|jept\b|septo\b|zep\b)/gi, "zepto");
t = t.replace(/\b(swiggi|swigy|sviggy|swigi|swiggie|swigi\b)/gi, "swiggy");
t = t.replace(/\b(zomoto|zommato|zomatto|zomata|zamato|zomato\s*app)/gi, "zomato");
t = t.replace(/\b(blink\s*it|blinket|blink\s*kit|blinkeet|blinkit\b)/gi, "blinkit");
t = t.replace(/\b(bigbasket|big\s*basket|bigbusket)/gi, "bigbasket");
t = t.replace(/\b(phone\s*pe|fonpe|phone\s*pay)/gi, "phonepe");
t = t.replace(/^(ed|at|had|add)\s+categor[yi]e?s?\s+/i, "add category ");
return t;
}
function parseVoice(normalizedText) {
let mainPart = normalizedText.trim(), description = "";
// FIX 1: Changed (.+) to (.*) so it catches the word even if the comment itself is blank
const cm = normalizedText.match(/\bcomment\b(.*)/i);
if (cm) { description = cm[1].trim(); mainPart = normalizedText.slice(0, normalizedText.toLowerCase().indexOf("comment")).trim(); }
let t = mainPart.toLowerCase().trim();
const HINDI_ONES = {"ek":1,"do":2,"teen":3,"char":4,"paanch":5,"chhe":6,"saat":7,"aath":8,"nau":9,"das":10,"gyarah":11,"barah":12,"terah":13,"chaudah":14,"pandrah":15,"solah":16,"satrah":17,"atharah":18,"unnees":19,"bees":20,"tees":30,"chaalees":40,"pachaas":50,"saath":60,"sattar":70,"assi":80,"nabbe":90,"hundred":100,"thousand":1000};
for (const [word,val] of Object.entries(HINDI_ONES)) { t = t.replace(new RegExp(`\\b${word}\\b`,"g"), String(val)); }
t = t.replace(/([\d.,]+)\s*(k|hazaar|hajar|thousand)\b/g, (_, n) => String(parseFloat(n.replace(/,/g,"")) * 1000));
t = t.replace(/([\d.,]+)\s*(lakh|lac|lacs|lakhs)\b/g, (_, n) => String(parseFloat(n.replace(/,/g,"")) * 100000));
t = t.replace(/([\d.,]+)\s*(crore|cr|crores)\b/g, (_, n) => String(parseFloat(n.replace(/,/g,"")) * 10000000));
t = t.replace(/([\d.,]+)\s*(so|sau|hundred)\b/g, (_, n) => String(parseFloat(n.replace(/,/g,"")) * 100));
t = t.replace(/([\d.,]+)\s*(million|m)\b/g, (_, n) => String(parseFloat(n.replace(/,/g,"")) * 1000000));

// FIX 2: Added "comment" to the FILLERS list so it never becomes part of the Expense Name
const FILLERS = ["add","please","karo","kar","mera","meri","ka","ki","ke","the","a","an","for","rs","rupees","rupay","rupaye","inr","₹","wala","wali", "comment"];
let words = t.split(/\s+/);
let currentTotal = 0, maxTotal = 0, lastNum = Infinity, nameWords = [];
for (let i = 0; i < words.length; i++) {
let w = words[i].replace(/,/g, "");
let isNum = w && !isNaN(parseFloat(w)) && isFinite(w);
let isFiller = FILLERS.includes(words[i]);
if (isNum) {
let n = parseFloat(w);
if (n <= lastNum) { currentTotal += n; } else { if (currentTotal > maxTotal) maxTotal = currentTotal; currentTotal = n; }
lastNum = n;
} else if (w && !isFiller) { nameWords.push(words[i]); }
}
if (currentTotal > maxTotal) maxTotal = currentTotal;
let name = nameWords.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ").trim();
if (!name) name = null;
return { amount: maxTotal > 0 ? maxTotal : null, name, description };
}

// ─── State management ──────────────────────────────────────────
function snapshot() {
history.push({ expenses: JSON.parse(JSON.stringify(state.expenses)), categories: [...state.categories] });
future = [];
}
function undo() {
if (!history.length) { showToast("Nothing to undo", true); return; }
future.unshift({ expenses: JSON.parse(JSON.stringify(state.expenses)), categories: [...state.categories] });
const prev = history.pop();
state.expenses = prev.expenses; state.categories = prev.categories;
invalidateCache(); saveToLocal(); showToast("Undone"); render();
}
function redo() {
if (!future.length) { showToast("Nothing to redo", true); return; }
history.push({ expenses: JSON.parse(JSON.stringify(state.expenses)), categories: [...state.categories] });
const next = future.shift();
state.expenses = next.expenses; state.categories = next.categories;
invalidateCache(); saveToLocal(); showToast("Redone"); render();
}
function showToast(msg, isError=false) {
state.toast = { text: msg, isError, time: Date.now() };
if (toastTimer) clearTimeout(toastTimer);
toastTimer = setTimeout(() => { state.toast = null; render(); }, 3000);
render();
}
function showCatToast(msg, isError=false) {
state.catToast = { text: msg, isError, time: Date.now() };
if (catToastTimer) clearTimeout(catToastTimer);
catToastTimer = setTimeout(() => { state.catToast = null; render(); }, 3000);
render();
}
function showCalAlert(msg) {
calViewState.alertMsg = msg;
if (calViewState.alertTimer) clearTimeout(calViewState.alertTimer);
calViewState.alertTimer = setTimeout(() => { calViewState.alertMsg = null; render(); }, 2000);
render();
}

function saveExpense({ name, amount, category, date, description, extras }, editId) {
snapshot();

// Capitalize the first letter of the description/comment if it exists
if (description) {
description = description.charAt(0).toUpperCase() + description.slice(1);
}

if (editId) {
state.expenses = state.expenses.map(e => e.id===editId ? {...e,name,amount,category,date,description,extras:extras||[]} : e);
showToast(`Expense [${name}] Updated`);
} else {
const cat = category || guessCategory(name);
state.expenses = [{ id: Date.now(), name, amount, date: date||new Date().toISOString(), category: cat, disabled: false, description: description||"", extras: extras||[] }, ...state.expenses];

// Check if there is a comment to customize the toast message
if (description) {
showToast(`Added [${name}] for ${formatINR(amount)} with Comment: ${description}`);
} else {
showToast(`Added [${name}] for ${formatINR(amount)}`);
}
}
invalidateCache(); saveToLocal(); render();
}
function deleteExpense(id) {
const exp = state.expenses.find(e=>e.id===id);
snapshot();

invalidateCache(); saveToLocal();

window.handleExcelUpload = (event) => {
const file = event.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = (e) => {
try {
const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data, {type: 'array'});
const firstSheet = workbook.SheetNames[0];
const worksheet = workbook.Sheets[firstSheet];
const json = XLSX.utils.sheet_to_json(worksheet, { defval: "", raw: false });
let errors = [], newExpenses = [];
json.forEach((row, index) => {
const keys = Object.keys(row);
const getVal = (possibleNames) => { for (let k of keys) { if (possibleNames.some(pn => k.toLowerCase().trim() === pn)) return String(row[k]).trim(); } return ""; };
const name = getVal(["expense name", "name", "expense"]);
const amountRaw = getVal(["expense amount", "amount", "price"]);
const dateVal = getVal(["date"]); const timeVal = getVal(["time"]);
const desc = getVal(["description", "desc", "note", "notes"]);
let missing = [];
if (!name && !amountRaw && !dateVal && !timeVal && !desc) return;
if (!name) missing.push("Expense Name");
if (!amountRaw || isNaN(parseFloat(amountRaw.replace(/[^0-9.-]/g,'')))) missing.push("Amount");
if (!dateVal) missing.push("Date"); if (!timeVal) missing.push("Time");
if (missing.length > 0) { errors.push(`Row ${index + 2}: Missing ${missing.join(", ")}`); return; }

let finalDate = dateVal, finalTime = timeVal;
let defaultTimeStr = `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`;
if (dateVal.toLowerCase() === 'default') finalDate = todayStr();
if (timeVal.toLowerCase() === 'default') finalTime = defaultTimeStr;
let iso; try { iso = robustDateParse(finalDate, finalTime); } catch(err) { iso = new Date().toISOString(); }

// Block future dates
const parsedDate = new Date(iso);
const todayEnd = new Date();
todayEnd.setHours(23, 59, 59, 999);
if (parsedDate > todayEnd) {
    errors.push(`Row ${index + 2}: Future dates are not allowed`);
    return;
}

const amount = parseFloat(amountRaw.replace(/[^0-9.-]/g,''));
newExpenses.push({ id: Date.now() + index + Math.floor(Math.random()*1000), name, amount, date: iso, category: guessCategory(name), disabled: false, description: desc, extras: [] });
});
if (errors.length > 0) { state.excelErrors = errors; state.showExcelErrorModal = true; }
else if (newExpenses.length > 0) {
snapshot();
newExpenses.forEach(exp => {
let matched = false;
for (const c of state.categories) { if (exp.name.toLowerCase().includes(c.toLowerCase())) { exp.category = c; matched = true; break; } }
if (!matched) exp.category = guessCategory(exp.name);
});
state.expenses = [...newExpenses.reverse(), ...state.expenses];
invalidateCache(); saveToLocal();
showToast(`Successfully uploaded ${newExpenses.length} expenses!`);
} else { showToast("No valid expenses found in file.", true); }
} catch (error) { showToast("Error reading file format.", true); }
render(); event.target.value = '';
};
reader.readAsArrayBuffer(file);
};

return monthOk&&yearOk&&searchOk&&rangeOk;
});

// VIRTUAL SCROLL ENGINE
// Only renders visible rows + OVERSCAN. Handles 100k+ entries.
// ═══════════════════════════════════════════════════════════════
function buildVirtualList(containerId, items, renderRowFn, storedScrollTop) {
const total = items.length;
if (total === 0) return `<div class="empty-msg">No expenses found</div>`;

const containerH = 680; // max-height of container
const totalH = total * ROW_H;

// Calculate visible window
const scrollTop = storedScrollTop || 0;
const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - OVERSCAN);
const endIdx = Math.min(total - 1, Math.ceil((scrollTop + containerH) / ROW_H) + OVERSCAN);

const topPad = startIdx * ROW_H;
const botPad = Math.max(0, (total - 1 - endIdx) * ROW_H);

const rows = [];
for (let i = startIdx; i <= endIdx; i++) {
rows.push(renderRowFn(items[i]));
}

return `<div style="height:${topPad}px;flex-shrink:0;"></div>
${rows.join('')}
<div style="height:${botPad}px;flex-shrink:0;"></div>`;
}

// Attach scroll listener to a virtual list container
function attachVirtualScroll(containerId, vsKey) {
const el = document.getElementById(containerId);
if (!el) return;

// Restore scroll position
el.scrollTop = vsState[vsKey]?.scrollTop || 0;

let ticking = false;
el.addEventListener('scroll', () => {
vsState[vsKey] = vsState[vsKey] || {};
vsState[vsKey].scrollTop = el.scrollTop;
if (!ticking) {
ticking = true;
requestAnimationFrame(() => {
ticking = false;
// Only update the inner content, not the whole view
patchVirtualContent(containerId, vsKey);
});
}
}, { passive: true });
}

// Patch virtual list content without full re-render (scroll-only update)
function patchVirtualContent(containerId, vsKey) {
const el = document.getElementById(containerId);
if (!el) return;

let items, renderFn;
if (vsKey === 'home') {
items = getFilteredExpenses();
renderFn = renderExpenseRow;
} else if (vsKey === 'catView') {
items = getCatFiltered(state.selectedCat);
renderFn = renderExpenseRow;
} else if (vsKey === 'bulkDelete') {
items = getBulkFilteredExpenses();
renderFn = renderBulkExpenseRow;
} else return;

const total = items.length;
const containerH = el.clientHeight || 680;
const scrollTop = el.scrollTop;

const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - OVERSCAN);
const endIdx = Math.min(total - 1, Math.ceil((scrollTop + containerH) / ROW_H) + OVERSCAN);

const topPad = startIdx * ROW_H;
const botPad = Math.max(0, (total - 1 - endIdx) * ROW_H);

// Build new content
const rows = [];
for (let i = startIdx; i <= endIdx; i++) rows.push(renderFn(items[i]));

el.innerHTML = `<div style="height:${topPad}px;flex-shrink:0;"></div>${rows.join('')}<div style="height:${botPad}px;flex-shrink:0;"></div>`;
}

// ─── Voice ────────────────────────────────────────────────────
function startVoice() {
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
if (!SR) { showToast("Voice not supported in this browser", true); return; }
const r = new SR();
r.lang = "en-IN"; r.interimResults = true; r.maxAlternatives = 5; r.continuous = false;
recognition = r;
r.onstart = () => { state.listening=true; render(); };
r.onresult = (ev) => {
const results = ev.results[ev.results.length-1];
const knownBrands = ["zepto","swiggy","zomato","amazon","flipkart","blinkit","bigbasket","phonepe"];
let best = results[0].transcript;
let bestNorm = normalizeSpeech(best);
let bestHasBrand = knownBrands.some(b => bestNorm.includes(b));
for (let i = 1; i < results.length; i++) {
const alt = results[i].transcript;
const altNorm = normalizeSpeech(alt);
const altHasBrand = knownBrands.some(b => altNorm.includes(b));
if (altHasBrand && !bestHasBrand) { best = alt; bestNorm = altNorm; bestHasBrand = true; }
}
state.voiceTextLive = best;
};
r.onend = () => {
state.listening=false;
const text = state.voiceTextLive;
if (text) {
const normalizedText = normalizeSpeech(text);
const normalizedLower = normalizedText.toLowerCase().trim();
if (normalizedLower.startsWith("add category")) {
const addCatIdx = normalizedLower.indexOf("add category") + 12;
let catName = normalizedText.substring(addCatIdx).trim();
catName = catName.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
if (catName) {
const exists = state.categories.find(c => c.toLowerCase() === catName.toLowerCase());
if (!exists) {
snapshot(); state.categories = [...state.categories, catName];
state.expenses = state.expenses.map(e => { if (e.name.toLowerCase().includes(catName.toLowerCase())) { return { ...e, category: catName }; } return e; });
invalidateCache(); saveToLocal(); showCatToast(`Added Category [${catName}]`);
} else { showCatToast(`Category [${catName}] already exists`, true); }
} else { showToast("Please specify a category name", true); }
state.voiceTextLive = ""; render(); return;
}
if (/^(undo|undo that|undo it|go back|un do)$/i.test(normalizedLower.trim())) { undo(); state.voiceTextLive=""; return; }
if (/^(redo|redo that|redo it|re do)$/i.test(normalizedLower.trim())) { redo(); state.voiceTextLive=""; return; }
if (normalizedLower.includes("delete all expenses")||normalizedLower.includes("delete all expense")) { deleteAllExpenses(); state.voiceTextLive=""; return; }
if (normalizedLower.includes("delete all categories")||normalizedLower.includes("delete all category")) { deleteAllCategories(); state.voiceTextLive=""; return; }
if (normalizedLower.includes("delete everything")) { if (confirm("Delete all expenses and categories?")) deleteEverything(); state.voiceTextLive=""; return; }
if (normalizedLower.includes("download excel")||normalizedLower.includes("download csv")||normalizedLower.includes("download file")||normalizedLower.includes("export")||normalizedLower.includes("download data")||normalizedLower.includes("export excel")||normalizedLower.includes("download report")) { downloadExcel(); state.voiceTextLive=""; return; }
const {amount,name,description} = parseVoice(normalizedText);
if (amount&&name) { saveExpense({name,amount,category:guessCategory(name),date:new Date().toISOString(),description:description||"",extras:[]}); }
else { showToast("Voice command unrecognized", true); }
state.voiceTextLive="";
}
render();
};
r.onerror = (ev) => {
state.listening=false; state.voiceTextLive="";
if (ev.error==="not-allowed") showToast("Microphone permission denied", true);
else if (ev.error==="no-speech") showToast("No speech detected – try again", true);
else showToast("Mic error – check permissions", true);
render();
};
r.start();
}
function stopVoice() { recognition?.stop(); }

function renderCatBarChart(expenses) {
const active = expenses.filter(e=>!e.disabled);
if (!active.length) return `<div class="empty-msg">No expenses to chart</div>`;
const GRAD_POOL = [
['#DC2626','#7C3AED'],['#059669','#F59E0B'],['#2563EB','#EC4899'],['#D97706','#06B6D4'],
['#7C3AED','#10B981'],['#F43F5E','#3B82F6'],['#0EA5E9','#F97316'],['#8B5CF6','#22C55E'],
['#EF4444','#14B8A6'],['#F59E0B','#6366F1'],['#10B981','#E879F9'],['#3B82F6','#FBBF24'],
['#EC4899','#34D399'],['#06B6D4','#A855F7'],['#84CC16','#F43F5E'],['#6366F1','#FB923C'],
['#F97316','#38BDF8'],['#A855F7','#4ADE80'],['#EF4444','#818CF8'],['#FBBF24','#0284C7'],
['#22D3EE','#FB7185'],['#4F46E5','#86EFAC'],['#DB2777','#67E8F9'],['#16A34A','#FCA5A5'],
['#7E22CE','#FDE68A'],['#B45309','#A5F3FC'],['#BE185D','#BBF7D0'],['#1D4ED8','#FED7AA'],
['#0F766E','#E9D5FF'],['#C2410C','#BFDBFE']
];
const grouped = {};
active.forEach(e => {
const d = new Date(e.date);
let key = '', sortKey = 0;
if (catChartState.period === 'month') { key = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`; sortKey = new Date(d.getFullYear(), d.getMonth(), 1).getTime(); }
else { key = `${d.getFullYear()}`; sortKey = new Date(d.getFullYear(), 0, 1).getTime(); }
if (!grouped[key]) grouped[key] = { amt: 0, sortKey };
grouped[key].amt += e.amount;
});
let entries = Object.entries(grouped).map(([label, data]) => ({ label, amt: data.amt, sortKey: data.sortKey }));
entries.sort((a,b) => a.sortKey - b.sortKey);
entries = entries.map((e, i) => { const pair = GRAD_POOL[i % GRAD_POOL.length]; return { ...e, c1: pair[0], c2: pair[1] }; });
if (!entries.length) return `<div class="empty-msg">No data</div>`;
const n = entries.length;
const maxAmt = Math.max(...entries.map(e => e.amt));
const rowH = catChartState.fullscreen ? 36 : 32;
const rowGap = catChartState.fullscreen ? 8 : 6;
const labelW = catChartState.fullscreen ? 80 : 70;
const amtW = catChartState.fullscreen ? 76 : 68;
const padT = 8, padB = 8, padL = 4, padR = 4;
const barAreaW = catChartState.fullscreen ? 220 : 160;
const totalW = padL + labelW + 8 + barAreaW + 8 + amtW + padR;
const totalH = padT + padB + n * rowH + (n - 1) * rowGap;
const chartId = `hbar-${Date.now()}`;
const gradDefs = entries.map((e, i) =>
`<linearGradient id="bg-${chartId}-${i}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${e.c1}"/><stop offset="100%" stop-color="${e.c2}"/></linearGradient>
<linearGradient id="lb-${chartId}-${i}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${e.c1}" stop-opacity="0.15"/><stop offset="100%" stop-color="${e.c2}" stop-opacity="0.15"/></linearGradient>`
).join('');
const rows = entries.map((e, i) => {
const y = padT + i * (rowH + rowGap);
const barW = maxAmt > 0 ? Math.max(6, (e.amt / maxAmt) * barAreaW) : 6;
const isMax = e.amt === maxAmt;
const cx = padL + labelW + 8;
const barY = y + rowH * 0.2;
const barH2 = rowH * 0.6;
const cy = y + rowH / 2;
return `<rect x="${padL}" y="${y}" width="${labelW}" height="${rowH}" rx="8" fill="url(#lb-${chartId}-${i})"/>
<text x="${padL + labelW/2}" y="${cy + 1}" text-anchor="middle" dominant-baseline="middle" font-size="${catChartState.fullscreen ? 11 : 10}" font-weight="700" fill="${e.c1}" font-family="Plus Jakarta Sans,sans-serif">${e.label}</text>
<rect x="${cx}" y="${barY}" width="${barAreaW}" height="${barH2}" rx="6" fill="#F0F0EE"/>
<rect x="${cx}" y="${barY}" width="${barW}" height="${barH2}" rx="6" fill="url(#bg-${chartId}-${i})"/>
<text x="${cx + barAreaW + 8}" y="${cy + 1}" text-anchor="start" dominant-baseline="middle" font-size="${catChartState.fullscreen ? 12 : 11}" font-weight="700" fill="${isMax ? e.c1 : '#1A2E25'}" font-family="Sora,sans-serif">${formatCatAmt(e.amt)}</text>
${isMax ? `<text x="${cx + barAreaW + 8}" y="${cy + 14}" text-anchor="start" font-size="8" font-weight="700" fill="${e.c1}" font-family="Plus Jakarta Sans,sans-serif">▲ PEAK</text>` : ''}`;
});
return `<div style="overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; max-height:${catChartState.fullscreen ? '75vh' : '340px'};">
<svg width="100%" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg" id="${chartId}" style="display:block;">
<defs>${gradDefs}</defs>${rows.join('')}
</svg>
</div>`;
}

function renderBarChart(expenses) {
const active = expenses.filter(e=>!e.disabled);
if (!active.length) return `<div class="empty-msg">No expenses to chart</div>`;
const byMonth = {};
active.forEach(e=>{ const d=new Date(e.date); const key=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`; byMonth[key]=(byMonth[key]||0)+e.amount; });
const entries = Object.entries(byMonth).slice(-6);
const max = Math.max(...entries.map(([,v])=>v));
return `<div class="bar-chart-wrap">
${entries.map(([label,val])=>`<div class="bar-col"><span class="bar-val">${formatINR(val)}</span><div class="bar-body" style="height:${max>0?Math.max(8,(val/max)*80):8}px"></div><span class="bar-label">${label}</span></div>`).join('')}
</div>`;
}

function renderAnalysisView() {
const now = new Date();
const currYear = state.analysisYear, currMonth = state.analysisMonth;
const daysInMonth = new Date(currYear, currMonth + 1, 0).getDate();
const currDay = (currYear === now.getFullYear() && currMonth === now.getMonth()) ? now.getDate() : daysInMonth;
let prevYear = currYear, prevMonth = currMonth - 1;
if (prevMonth < 0) { prevMonth = 11; prevYear--; }
const activeExps = state.expenses.filter(e => !e.disabled);
const currMonthExps = activeExps.filter(e => { const d = new Date(e.date); return d.getFullYear() === currYear && d.getMonth() === currMonth; });
const prevMonthExps = activeExps.filter(e => { const d = new Date(e.date); return d.getFullYear() === prevYear && d.getMonth() === prevMonth; });
const prevMonthExpsToDate = prevMonthExps.filter(e => new Date(e.date).getDate() <= currDay);
const currSpent = currMonthExps.reduce((s, e) => s + e.amount, 0);
const prevSpentToDate = prevMonthExpsToDate.reduce((s, e) => s + e.amount, 0);
const budget = state.monthlyBudget || 50000;
const budgetPct = Math.min((currSpent / budget) * 100, 100);
const budgetColor = budgetPct < 75 ? '#16A34A' : budgetPct < 90 ? '#EAB308' : '#DC2626';
let momText = "Same as last month", momClass = "metric-sub";
if (prevMonthExps.length === 0) { momText = "No previous month data"; }
else if (prevSpentToDate > 0) {
const diff = currSpent - prevSpentToDate;
const pct = Math.abs((diff / prevSpentToDate) * 100).toFixed(1);
if (diff > 0) { momText = ` ▲ ${pct}% vs last mo`; momClass += " trend-up"; }
else if (diff < 0) { momText = ` ▼ ${pct}% vs last mo`; momClass += " trend-down"; }
} else if (currSpent > 0) { momText = ` ▲ 100% vs last mo`; momClass += " trend-up"; }
const burnRate = currDay > 0 ? currSpent / currDay : 0;
const projected = burnRate * daysInMonth;
const catTotals = {};
currMonthExps.forEach(e => { const c = e.category || 'Other'; catTotals[c] = (catTotals[c] || 0) + e.amount; });
const sortedCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
const topExps = [...currMonthExps].sort((a, b) => b.amount - a.amount).slice(0, 4);

// Build month dropdown from months that have expenses
const monthsWithData = [];
const seen = new Set();
activeExps.forEach(e => {
  const d = new Date(e.date);

function checkExpensesExistForMonth(year, month) {
return state.expenses.some(e => { const d = new Date(e.date); return d.getFullYear() === year && d.getMonth() === month; });
}

function renderCalendarView() {
const cv = calViewState;
const today = new Date();
const monthExpenses = state.expenses.filter(e=>{ const d=new Date(e.date); return d.getFullYear()===cv.calYear && d.getMonth()===cv.calMonth && !e.disabled; });
const expenseNamesInMonth = [...new Set(monthExpenses.map(e=>e.name))].sort();
const sourceExpenses = cv.mode==="expense"&&cv.selExpenseName ? monthExpenses.filter(e=>e.name===cv.selExpenseName) : cv.mode==="date" ? monthExpenses : [];
const dayTotals = {};
sourceExpenses.forEach(e=>{ const d=new Date(e.date).getDate(); dayTotals[d]=(dayTotals[d]||0)+e.amount; });
const headerTotal = Object.values(dayTotals).reduce((s,v)=>s+v,0);
const showTotal = (cv.mode==="date" || (cv.mode==="expense"&&cv.selExpenseName)) && headerTotal > 0;
const firstDay = new Date(cv.calYear,cv.calMonth,1).getDay();
const daysInMonth = new Date(cv.calYear,cv.calMonth+1,0).getDate();
const isToday = (d) => d===today.getDate()&&cv.calMonth===today.getMonth()&&cv.calYear===today.getFullYear();
const cells = [];
for (let i=0;i<firstDay;i++) cells.push(null);
for (let d=1;d<=daysInMonth;d++) cells.push(d);
const modeIsOpen = openDropdown==='cal-mode-dd';
const expIsOpen = openDropdown==='cal-exp-dd';
const modeLabel = cv.mode==="date"?"Date Wise":"Expense Wise";
const modeDD = `<div class="dropdown-wrap">
<button class="dropdown-btn${cv.mode!=='date'?' active':''}" onclick="toggleDropdown('cal-mode-dd',event)">${modeLabel} ${SVG.chevronDown}</button>
<div class="dropdown-menu${modeIsOpen?' open':''}" id="cal-mode-dd" style="min-width:130px">
<div style="padding:6px 0">
<div class="dropdown-item${cv.mode==='date'?' selected':''}" onclick="setCalMode('date')">Date Wise</div>
<div class="dropdown-item${cv.mode==='expense'?' selected':''}" onclick="setCalMode('expense')">Expense Wise</div>
</div>
</div>
</div>`;
let expDD = '';
if (cv.mode==='expense') {
const expLabel = cv.selExpenseName||"Select";
expDD = `<div class="dropdown-wrap">
<button class="dropdown-btn${cv.selExpenseName?' active':''}" onclick="toggleDropdown('cal-exp-dd',event)">${expLabel} ${SVG.chevronDown}</button>
<div class="dropdown-menu${expIsOpen?' open':''}" id="cal-exp-dd" style="min-width:130px">
<div style="padding:6px 0">
${expenseNamesInMonth.map(n=>`<div class="dropdown-item${cv.selExpenseName===n?' selected':''}" onclick="setCalExpense('${escHtml(n)}')">${escHtml(n)}</div>`).join('')}
</div>
</div>
</div>`;
}
let monthPickerHTML = '';
if (cv.showMonthPicker) {
monthPickerHTML = `<div class="modal-overlay center" onclick="calViewState.showMonthPicker=false;render()">
<div class="modal-box center-box" onclick="event.stopPropagation()">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<span style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#1A2E25">Jump to Month</span>
<button class="modal-close" onclick="calViewState.showMonthPicker=false;render()">×</button>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
<button class="cal-nav-btn" onclick="calViewState.tempYear--;render()">${SVG.chevLeft}</button>
<input type="number" value="${cv.tempYear}" oninput="calViewState.tempYear=parseInt(this.value)||calViewState.calYear" style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#1A2E25;border:none;outline:none;background:transparent;text-align:center;width:70px">
<button class="cal-nav-btn" onclick="calViewState.tempYear++;render()">${SVG.chevRight}</button>
</div>
<div class="month-grid">
${MONTHS.map((m,i)=>{ const sel=i===cv.calMonth&&cv.tempYear===cv.calYear; return `<button class="month-btn${sel?' selected':''}" onclick="pickMonth(${i})">${m}</button>`; }).join('')}
</div>
</div>
</div>`;
}
return `<div style="font-family:'Plus Jakarta Sans',sans-serif;background:#F7F5F0;min-height:100vh;overflow-x:hidden;padding-bottom:80px">
<div class="app-wrap">
<div class="topbar">
<div style="flex: 1; display:flex; align-items:center; gap:10px;"><button class="cal-nav-btn" onclick="navClick('home')" style="width:32px;height:32px">${SVG.back}</button></div>
<img src="EEE.png" alt="Cashflow" style="height: 50px; object-fit: contain;">
<div style="flex: 1; display:flex; gap:6px; align-items:center; justify-content:flex-end;"></div>
</div>
<div style="display:flex; align-items:center; justify-content:space-between; padding:0 18px 10px;">
<div style="display:flex;align-items:center;gap:8px">${SVG.calIcon18}<span class="app-title" style="font-size:16px;">Calendar</span></div>
<div style="flex:1; text-align:center; padding: 0 10px; display:flex; justify-content:center;">
${cv.alertMsg ? `<span style="font-size:11px; font-weight:700; color:#DC2626; background:#FEF2F2; padding:3px 8px; border-radius:6px; animation: alertIn 0.3s forwards; white-space: nowrap;">${cv.alertMsg}</span>` : ''}
</div>
<div style="display:flex;gap:6px;align-items:center">${modeDD}${expDD}</div>
</div>
<div style="text-align:right;padding:0 18px 10px">
${showTotal?`<span style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#1A4D3A">${formatINR(headerTotal)}</span>`:''}
</div>
<div class="cal-month-nav">
<button class="cal-nav-btn" onclick="calPrevMonth()">${SVG.chevLeft}</button>
<button onclick="calViewState.showMonthPicker=true;calViewState.tempYear=calViewState.calYear;render()" style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:10px">
<span class="cal-month-title">${MONTHS_FULL[cv.calMonth]} ${cv.calYear}</span>${SVG.chevronDown}
</button>
<button class="cal-nav-btn" onclick="calNextMonth()">${SVG.chevRight}</button>
</div>
<div class="cal-grid-wrap">
<div class="cal-day-headers">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}</div>
<div class="cal-day-cells">
${cells.map((day,i)=>{
if (!day) return `<div></div>`;
const amt=dayTotals[day];
const hasAmt=amt!=null&&amt>0;
const tod=isToday(day);
const cls='cal-cell'+(hasAmt?' has-amt':'')+(tod?' is-today':'')+(!hasAmt?' no-amt':'');
const amtStr=amt>=10000000?(amt/10000000).toFixed(1).replace(/\.0$/,"")+"Cr":amt>=100000?(amt/100000).toFixed(1).replace(/\.0$/,"")+"L":amt>=1000?(amt/1000).toFixed(1).replace(/\.0$/,"")+"k":amt;
return `<div class="${cls}"><span class="cal-day-num">${day}</span>${hasAmt?`<span class="cal-day-amt">${amtStr}</span>`:''}</div>`;
}).join('')}
</div>
</div>
${(state.showAddModal||state.editTarget!=null)?`<div id="expense-modal-container">${buildExpenseModal()}</div>`:''}
${renderBottomNav(state.activeTab)}
${renderDownloadAlert()}
${monthPickerHTML}
</div>
</div>`;
}

window.openBulkDelete = () => {
state.view = 'bulkDelete';
bulkDeleteState = { selMonths: [], selYears: [], selectedIds: new Set() };
vsState.bulkDelete = { scrollTop: 0 };
render();
};

window.setBulkMonthFilter = (arr) => { bulkDeleteState.selMonths = arr; openDropdown = null; _cache.bulkFiltered = null; render(); };
window.toggleBulkMonth = (idx) => { bulkDeleteState.selMonths = bulkDeleteState.selMonths.includes(idx) ? bulkDeleteState.selMonths.filter(m=>m!==idx) : [...bulkDeleteState.selMonths,idx]; _cache.bulkFiltered = null; render(); };
window.setBulkYearFilter = (arr) => { bulkDeleteState.selYears = arr; openDropdown = null; _cache.bulkFiltered = null; render(); };
window.toggleBulkYear = (yr) => { bulkDeleteState.selYears = bulkDeleteState.selYears.includes(yr) ? bulkDeleteState.selYears.filter(y=>y!==yr) : [...bulkDeleteState.selYears,yr]; _cache.bulkFiltered = null; render(); };

window.toggleBulkSelect = (id) => {
if (bulkDeleteState.selectedIds.has(id)) bulkDeleteState.selectedIds.delete(id);
else bulkDeleteState.selectedIds.add(id);
render();
};

window.toggleBulkSelectAll = () => {
const visibleExps = getBulkFilteredExpenses();
if (visibleExps.length === 0) return;
const visibleIds = visibleExps.map(e => e.id);
const allSelected = visibleIds.every(id => bulkDeleteState.selectedIds.has(id));

if (allSelected) {
    visibleIds.forEach(id => bulkDeleteState.selectedIds.delete(id));
} else {
    visibleIds.forEach(id => bulkDeleteState.selectedIds.add(id));
}
render();
};

window.executeBulkDelete = () => {
if (bulkDeleteState.selectedIds.size === 0) return;
if (!confirm(`Are you sure you want to delete ${bulkDeleteState.selectedIds.size} expenses? This cannot be undone.`)) return;

snapshot();
state.expenses = state.expenses.filter(e => !bulkDeleteState.selectedIds.has(e.id));
bulkDeleteState.selectedIds.clear();
invalidateCache();
saveToLocal();
showToast(`Successfully deleted expenses`);
render();
};


// ─── Category Analytics ────────────────────────────────────────
function renderCategoryAnalytics(catExpenses, cat) {
const active = catExpenses.filter(e => !e.disabled);
if (!active.length) return '';
const total = active.reduce((s, e) => s + e.amount, 0);
const count = active.length;
const avg = total / count;
const sorted = [...active].sort((a, b) => b.amount - a.amount);
const highest = sorted[0], lowest = sorted[sorted.length - 1];
const now = new Date();
const monthly = {};
active.forEach(e => { const d = new Date(e.date); const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; monthly[key] = (monthly[key] || 0) + e.amount; });
const dates = active.map(e => new Date(e.date).getTime()).sort((a,b) => a-b);
let avgGap = 0;
if (dates.length > 1) { const gaps = []; for (let i = 1; i < dates.length; i++) gaps.push((dates[i] - dates[i-1]) / 86400000); avgGap = gaps.reduce((s,g) => s+g, 0) / gaps.length; }
const currM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
let prevDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
const prevM = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}`;
const currMonthAmt = monthly[currM] || 0;
const prevMonthAmt = monthly[prevM] || 0;
let momText = '', momColor = '#8A8880';
if (prevMonthAmt > 0 && currMonthAmt > 0) { const diff = ((currMonthAmt - prevMonthAmt) / prevMonthAmt * 100); momText = diff > 0 ? `▲ ${Math.abs(diff).toFixed(0)}% vs last month` : `▼ ${Math.abs(diff).toFixed(0)}% vs last month`; momColor = diff > 0 ? '#DC2626' : '#16A34A'; }
else if (currMonthAmt > 0 && !prevMonthAmt) { momText = 'No data last month'; momColor = '#8A8880'; }
else if (!currMonthAmt) { momText = 'No spend this month'; momColor = '#A0AFA8'; }
const tooltipIdFreq = `tip-freq-${Date.now()}`;
return `<div style="margin: 0 16px 12px;">
<div style="font-size:12px; font-weight:700; color:#A0AFA8; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; padding-left:2px;">Category Insights</div>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">

<div style="font-size:10px; color:#7ABDA8; font-weight:600; margin-top:4px;">${count} transactions total</div>
</div>
<div style="background:#fff; border-radius:16px; border:0.5px solid #E8E6DF; padding:14px 14px 12px;">
<div style="font-size:10px; font-weight:700; color:#A0AFA8; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;">This Month</div>
<div style="font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:#1A2E25; line-height:1.1;">${currMonthAmt > 0 ? formatINR(currMonthAmt) : '—'}</div>
<div style="font-size:10px; color:${momColor}; font-weight:600; margin-top:4px;">${momText || 'No data yet'}</div>
</div>
</div>
<div style="background:#fff; border-radius:16px; border:0.5px solid #E8E6DF; padding:14px; margin-bottom:10px;">
<div style="font-size:10px; font-weight:700; color:#A0AFA8; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px;">Spending Range</div>
<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
<div style="flex:1;">
<div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;"><div style="width:8px;height:8px;border-radius:50%;background:#DC2626;flex-shrink:0;"></div><span style="font-size:11px;font-weight:700;color:#DC2626;">Highest</span></div>
<div style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#1A2E25;">${formatINR(highest.amount)}</div>
<div style="font-size:10px;color:#8A8880;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${highest.name}</div>
<div style="font-size:9px;color:#C0BDB5;margin-top:1px;">${new Date(highest.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
</div>
<div style="width:1px;background:#E8E6DF;align-self:stretch;"></div>
<div style="flex:1; text-align:right;">
<div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; justify-content:flex-end;"><div style="width:8px;height:8px;border-radius:50%;background:#16A34A;flex-shrink:0;"></div><span style="font-size:11px;font-weight:700;color:#16A34A;">Lowest</span></div>
<div style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#1A2E25;">${formatINR(lowest.amount)}</div>
<div style="font-size:10px;color:#8A8880;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lowest.name}</div>
<div style="font-size:9px;color:#C0BDB5;margin-top:1px;">${new Date(lowest.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
</div>
</div>
</div>
<div style="background:#fff; border-radius:16px; border:0.5px solid #E8E6DF; padding:14px 14px 12px; position:relative;">
<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
<div style="font-size:10px; font-weight:700; color:#A0AFA8; text-transform:uppercase; letter-spacing:0.5px;">Avg Frequency</div>
<button onclick="event.stopPropagation();var t=document.getElementById('${tooltipIdFreq}');t.style.display=t.style.display==='none'?'block':'none';" style="background:#EAE8E0;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;flex-shrink:0;">
<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#8A8880" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
</button>
</div>
<div id="${tooltipIdFreq}" style="display:none; position:absolute; top:38px; right:8px; left:8px; background:#1A2E25; color:#fff; font-size:11px; font-weight:500; line-height:1.5; padding:10px 12px; border-radius:10px; z-index:20; box-shadow:0 4px 16px rgba(0,0,0,0.18);">
The average number of days between your transactions in this category. A lower number means you spend here more frequently.
<div style="position:absolute;top:-5px;right:14px;width:10px;height:10px;background:#1A2E25;transform:rotate(45deg);border-radius:2px;"></div>
</div>
<div style="display:flex; align-items:baseline; gap:10px;">
<div style="font-family:'Sora',sans-serif; font-size:22px; font-weight:700; color:#1A2E25; line-height:1.1;">${avgGap > 0 ? `${avgGap.toFixed(1)} Days` : '—'}</div>
<div style="font-size:12px; color:#8A8880; font-weight:600;">avg between transactions</div>
</div>
</div>
</div>`;
}

// ─── Home View ────────────────────────────────────────────────
function renderHomeView() {

const totalAll = activeExpenses.reduce((s,e)=>s+e.amount,0);
const disabledCount = state.expenses.filter(e=>e.disabled).length;

// Compute category stats in one pass (O(n) instead of O(n*m))
const catStats = {};
for (const e of filteredExpenses) {
const cat = (e.category||"").toLowerCase();
if (!catStats[cat]) catStats[cat] = { amt: 0, cnt: 0 };
if (!e.disabled) catStats[cat].amt += e.amount;
catStats[cat].cnt++;
}

return `<div style="font-family:'Plus Jakarta Sans',sans-serif;background:#F7F5F0;min-height:100vh;overflow-x:hidden">

// Debounced search input — avoids re-render on every keystroke
window.handleSearchInput = (val) => {
if (_searchDebounce) clearTimeout(_searchDebounce);
_searchDebounce = setTimeout(() => {
state.searchQuery = val;
_cache.filtered = null;
render();
}, 120); // 120ms debounce feels instant but skips mid-typing renders
};

// ─── Event handlers ───────────────────────────────────────────
window.toggleDropdown = (id, e) => { e.stopPropagation(); openDropdown = openDropdown===id ? null : id; render(); };
window.setMonthFilter = (arr) => { state.selMonths=arr; openDropdown=null; _cache.filtered=null; render(); };
window.toggleMonth = (idx) => { state.selMonths = state.selMonths.includes(idx) ? state.selMonths.filter(m=>m!==idx) : [...state.selMonths,idx]; _cache.filtered=null; render(); };
window.setYearFilter = (arr) => { state.selYears=arr; openDropdown=null; _cache.filtered=null; render(); };
window.toggleYear = (yr) => { state.selYears = state.selYears.includes(yr) ? state.selYears.filter(y=>y!==yr) : [...state.selYears,yr]; _cache.filtered=null; render(); };
window.setCatViewMonthFilter = (arr) => { catViewFilters.selMonths=arr; openDropdown=null; _cache.catFiltered={}; render(); };
window.toggleCatViewMonth = (idx) => { catViewFilters.selMonths = catViewFilters.selMonths.includes(idx) ? catViewFilters.selMonths.filter(m=>m!==idx) : [...catViewFilters.selMonths,idx]; _cache.catFiltered={}; render(); };
window.setCatViewYearFilter = (arr) => { catViewFilters.selYears=arr; openDropdown=null; _cache.catFiltered={}; render(); };
window.toggleCatViewYear = (yr) => { catViewFilters.selYears = catViewFilters.selYears.includes(yr) ? catViewFilters.selYears.filter(y=>y!==yr) : [...catViewFilters.selYears,yr]; _cache.catFiltered={}; render(); };
window.openCategory = (cat) => { state.selectedCat=cat; state.view='category'; catViewFilters={selMonths:[...state.selMonths],selYears:[...state.selYears],dateRange:state.dateRange?{...state.dateRange}:null}; vsState.catView={scrollTop:0}; render(); };
window.deleteCategory = (cat) => { snapshot(); state.categories=state.categories.filter(c=>c.toLowerCase()!==cat.toLowerCase()); invalidateCache(); saveToLocal(); showCatToast(`Deleted Category [${cat}]`, true); render(); };
window.confirmDeleteAllCategories = () => { window.deleteAllCategories(); };
window.navClick = (key) => {
if (key==="download") { state.showDownloadAlert = true; render(); return; }
if (key==="home") { state.activeTab="home"; state.view="home"; }
else if (key==="calendar") { state.activeTab="calendar"; state.view="calendar"; calViewState.selExpenseName=null; }
else if (key==="analysis") { state.activeTab="analysis"; state.view="analysis"; }
else { state.activeTab=key; state.view=key; }
render();
};
window.calPrevMonth = () => {
let m = calViewState.calMonth === 0 ? 11 : calViewState.calMonth - 1;
let y = calViewState.calMonth === 0 ? calViewState.calYear - 1 : calViewState.calYear;
if (!checkExpensesExistForMonth(y, m)) { showCalAlert("No expenses for that month/year"); return; }
calViewState.calMonth = m; calViewState.calYear = y; calViewState.selExpenseName=null; render();
};
window.calNextMonth = () => {
let m = calViewState.calMonth === 11 ? 0 : calViewState.calMonth + 1;
let y = calViewState.calMonth === 11 ? calViewState.calYear + 1 : calViewState.calYear;
if (!checkExpensesExistForMonth(y, m)) { showCalAlert("No expenses for that month/year"); return; }
calViewState.calMonth = m; calViewState.calYear = y; calViewState.selExpenseName=null; render();
};
window.setCalMode = (m) => { calViewState.mode=m; calViewState.selExpenseName=null; openDropdown=null; render(); };
window.setCalExpense = (n) => { calViewState.selExpenseName=n; openDropdown=null; render(); };
window.pickMonth = (i) => {
if (!checkExpensesExistForMonth(calViewState.tempYear, i)) { showCalAlert("No expenses for that month/year"); return; }
calViewState.calMonth=i; calViewState.calYear=calViewState.tempYear; calViewState.showMonthPicker=false; render();
};
window.setChartPeriod = (p) => { catChartState.period = p; openDropdown = null; render(); };
window.toggleChartFullscreen = () => { catChartState.fullscreen = !catChartState.fullscreen; render(); };
window.setAnalysisMonth = (month, year) => { state.analysisMonth = month; state.analysisYear = year; openDropdown = null; render(); };

// ─── Main render ──────────────────────────────────────────────
let _lastView = null;
function render() {
const app = document.getElementById('app');
if (!app) return;
let newView;
if (state.activeTab==='calendar') { app.innerHTML = renderCalendarView(); newView='calendar'; }
else if (state.activeTab==='analysis') { app.innerHTML = renderAnalysisView(); newView='analysis'; }
else if (state.activeTab==='settings' && state.view !== 'bulkDelete') { app.innerHTML = renderSettingsView(); newView='settings'; }
else if (state.view==='bulkDelete') { app.innerHTML = renderBulkDeleteView(); newView='bulkDelete'; }
else if (state.view==='info') { app.innerHTML = renderInfoView(); newView='info'; }
else if (state.view==='category'&&state.selectedCat) { app.innerHTML = renderCategoryView(); newView='category:'+state.selectedCat; }
else { app.innerHTML = renderHomeView(); newView='home'; }

if (newView !== _lastView) {
window.scrollTo(0, 0);
document.documentElement.scrollTop = 0;
document.body.scrollTop = 0;
_lastView = newView;
}

// Attach virtual scroll listeners after render
if (newView === 'home') attachVirtualScroll('home-list', 'home');
else if (newView && newView.startsWith('category:')) attachVirtualScroll('catview-list', 'catView');
else if (newView === 'bulkDelete') attachVirtualScroll('bulk-list', 'bulkDelete');
}

document.addEventListener('click', (e) => { if (openDropdown) { openDropdown = null; render(); } });

render();
</script>
<div id="date-range-modal-wrap" style="display:none;position:fixed;inset:0;z-index:200"></div>
</body>
</html>
